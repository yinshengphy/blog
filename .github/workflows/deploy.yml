name: 部署 Astro 博客到 K3s

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: blog-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - blog
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: 检出代码
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          for item in * .*; do
            case "$item" in
              .|..|.runner-cache|node_modules)
                continue
                ;;
            esac
            rm -rf "$item"
          done
          if curl --retry 3 --retry-delay 5 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o source.tar.gz \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}"; then
            tar -xzf source.tar.gz --strip-components=1
            rm source.tar.gz
          else
            rm -f source.tar.gz
            git config --global http.version HTTP/1.1
            git init .
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
            if git fetch --depth=1 origin "${GITHUB_SHA}"; then
              git checkout --force FETCH_HEAD
            else
              echo "git 拉取失败，改用 GitHub API 下载源码"
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const sha = process.env.GITHUB_SHA;
          const [owner, repo] = repository.split("/");

          async function githubJson(url) {
            for (let attempt = 1; attempt <= 4; attempt += 1) {
              const response = await fetch(url, {
                headers: {
                  Authorization: `Bearer ${token}`,
                  Accept: "application/vnd.github+json",
                  "User-Agent": "self-hosted-runner"
                }
              });
              if (response.ok) {
                return response.json();
              }
              if (attempt === 4) {
                throw new Error(`${response.status} ${response.statusText} ${url}`);
              }
              await new Promise(resolve => setTimeout(resolve, attempt * 1500));
            }
          }

          const commit = await githubJson(`https://api.github.com/repos/${owner}/${repo}/git/commits/${sha}`);
          const tree = await githubJson(`https://api.github.com/repos/${owner}/${repo}/git/trees/${commit.tree.sha}?recursive=1`);
          if (tree.truncated) {
            throw new Error("GitHub API 返回的文件树被截断");
          }

          for (const entry of tree.tree) {
            if (entry.type === "tree") {
              fs.mkdirSync(entry.path, { recursive: true });
              continue;
            }
            if (entry.type !== "blob") {
              continue;
            }
            const blob = await githubJson(entry.url);
            const target = path.resolve(entry.path);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            const content = Buffer.from(blob.content.replace(/\n/g, ""), blob.encoding);
            if (entry.mode === "120000") {
              fs.symlinkSync(content.toString("utf8"), target);
            } else {
              fs.writeFileSync(target, content);
              if (entry.mode === "100755") {
                fs.chmodSync(target, 0o755);
              }
            }
          }
          NODE
            fi
            rm -rf .git
          fi

      - name: 使用国内 npm 镜像
        run: |
          npm config set registry https://registry.npmmirror.com
          npm config set cache "$PWD/.runner-cache/npm"

      - name: 检查依赖缓存
        id: deps
        run: |
          set -euo pipefail
          mkdir -p .runner-cache
          cat package.json package-lock.json | sha256sum | awk '{print $1}' > .runner-cache/deps.sha.current

          if [ -d node_modules ] && [ -f .runner-cache/deps.sha ] && cmp -s .runner-cache/deps.sha.current .runner-cache/deps.sha; then
            echo "install=false" >> "$GITHUB_OUTPUT"
            echo "依赖未变化且 node_modules 存在，跳过安装"
          else
            echo "install=true" >> "$GITHUB_OUTPUT"
            echo "依赖缺失或已变化，执行 npm ci"
          fi

      - name: 安装依赖
        if: steps.deps.outputs.install == 'true'
        run: |
          npm ci --prefer-offline --no-audit --no-fund --cache "$PWD/.runner-cache/npm"
          cp .runner-cache/deps.sha.current .runner-cache/deps.sha

      - name: 构建
        run: npm exec -- astro build

      - name: 发布到 K3s PVC
        run: |
          test -d dist
          mkdir -p /deploy/public
          if command -v rsync >/dev/null 2>&1; then
            rsync -a --delete dist/ /deploy/public/
          else
            find /deploy/public -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -a dist/. /deploy/public/
          fi
          echo "已发布 $(du -sh dist | cut -f1) 到 PVC"

      - name: 同步 Markdown 源文件给 RAG 索引器
        run: |
          mkdir -p /deploy/content/posts
          if command -v rsync >/dev/null 2>&1; then
            rsync -a --delete src/content/posts/ /deploy/content/posts/
          else
            find /deploy/content/posts -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -a src/content/posts/. /deploy/content/posts/
          fi
          echo "已同步 Markdown 文章给 RAG 索引器"

      - name: 同步新增和变更文章索引
        run: |
          set -euo pipefail
          if [ -z "${INDEX_API_TOKEN:-}" ]; then
            echo "未配置 INDEX_API_TOKEN，无法同步博客索引"
            exit 1
          fi

          for attempt in $(seq 1 12); do
            status=$(curl --silent --show-error --max-time 600 \
              --output /tmp/blog-index-response.json \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer ${INDEX_API_TOKEN}" \
              http://blog-service:8080/internal/index/sync)
            if [ "$status" = "200" ]; then
              cat /tmp/blog-index-response.json
              echo "博客索引同步完成"
              exit 0
            fi
            if [ "$status" = "409" ]; then
              echo "模型正在处理聊天或索引任务，30 秒后重试（${attempt}/12）"
              sleep 30
              continue
            fi
            cat /tmp/blog-index-response.json || true
            echo "博客索引同步失败，HTTP ${status}"
            exit 1
          done

          echo "博客索引同步等待超时"
          exit 1
