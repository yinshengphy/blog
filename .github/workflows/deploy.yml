name: Deploy Blog to K3s

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - blog
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use domestic npm registry
        run: |
          npm config set registry https://registry.npmmirror.com
          if [ -f package-lock.json ]; then
            sed -i 's#https\?://registry\.npm\.taobao\.org/#https://registry.npmmirror.com/#g' package-lock.json
          fi

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to K3s PVC
        run: |
          test -d public
          mkdir -p /deploy/public
          find /deploy/public -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a public/. /deploy/public/
