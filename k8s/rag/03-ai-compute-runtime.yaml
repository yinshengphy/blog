apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-compute-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-compute-runtime
  namespace: ai
spec:
  selector:
    app: ai-compute-runtime
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-compute-runtime
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-compute-runtime
  template:
    metadata:
      labels:
        app: ai-compute-runtime
    spec:
      containers:
        - name: ollama
          image: m.daocloud.io/docker.io/ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: HTTP_PROXY
              value: http://192.168.31.53:7890
            - name: HTTPS_PROXY
              value: http://192.168.31.53:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,0.0.0.0,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16
            - name: http_proxy
              value: http://192.168.31.53:7890
            - name: https_proxy
              value: http://192.168.31.53:7890
            - name: no_proxy
              value: localhost,127.0.0.1,0.0.0.0,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 2Gi
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ai-compute-models
