apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: ai
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: yinsheng-search
    search:
      safe_search: 1
      formats:
        - html
        - json
    server:
      bind_address: 0.0.0.0
      port: 8080
      secret_key: yinsheng-internal-search-service
      limiter: false
      image_proxy: false
    outgoing:
      request_timeout: 10.0
      max_request_timeout: 15.0
      proxies:
        all://:
          - http://192.168.31.53:7890
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai
spec:
  selector:
    app: searxng
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      enableServiceLinks: false
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_PORT
              value: "8080"
            - name: HTTP_PROXY
              value: http://192.168.31.53:7890
            - name: HTTPS_PROXY
              value: http://192.168.31.53:7890
            - name: NO_PROXY
              value: localhost,127.0.0.1,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: settings
          configMap:
            name: searxng-settings
